name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Verify runtime baseline
        run: npm run verify:runtimes

      - name: Verify dependency audits
        run: npm run verify:deps

      - name: Verify secret scan
        run: npm run verify:secrets

      - name: Verify backend gofmt
        run: npm run verify:backend:format

      - name: Verify config safety
        run: npm run verify:config-safety

      - name: Typecheck
        run: npm run typecheck

      - name: Build user app
        run: npm run build:user

      - name: Build admin app
        run: npm run build:admin

      - name: Test user app
        run: npm run test:user

      - name: Test admin app
        run: npm run test:admin

      - name: Test graph core
        run: npm --workspace @studymate/graph-core run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test e2e
        run: npm run test:e2e

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Verify coverage baseline
        run: npm run verify:coverage

      - name: Verify docs
        run: npm run verify:docs
